<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Rehau Blitz 60 — срез профиля</title>
<style>
  body { background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
  .preview { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); text-align: center; }
  h2 { margin: 20px 0 4px; font-size: 18px; color: #1a1a1a; }
  p { margin: 0; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="preview">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 460" width="300" height="460">
  <defs>
    <!-- PVC пластик -->
    <linearGradient id="pvc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <!-- PVC тень -->
    <linearGradient id="pvcShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <!-- Стекло -->
    <linearGradient id="glass" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#d4eaf7"/>
      <stop offset="40%" stop-color="#b8ddf0"/>
      <stop offset="100%" stop-color="#a1cfeb"/>
    </linearGradient>
    <!-- Стеклопакет дистанция -->
    <linearGradient id="spacer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <!-- Армирование -->
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <!-- Тень на профиле -->
    <filter id="softShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <filter id="innerShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ===== РАМА (нижняя часть) ===== -->
  <g filter="url(#softShadow)">
    <!-- Внешний контур рамы -->
    <path d="M30,250 L30,430 Q30,445 40,445 L260,445 Q270,445 270,430 L270,250 Z"
          fill="url(#pvc)" stroke="#ccc" stroke-width="1"/>

    <!-- Камера 1 рамы (левая нижняя) -->
    <rect x="38" y="340" width="80" height="96" rx="3" fill="#fff" stroke="#ddd" stroke-width="0.8" opacity="0.6"/>

    <!-- Камера 2 рамы (правая нижняя) -->
    <rect x="128" y="340" width="78" height="96" rx="3" fill="#fff" stroke="#ddd" stroke-width="0.8" opacity="0.6"/>

    <!-- Камера 3 рамы (центральная верхняя) -->
    <rect x="38" y="265" width="168" height="65" rx="3" fill="#fff" stroke="#ddd" stroke-width="0.8" opacity="0.6"/>

    <!-- Армирование рамы -->
    <rect x="215" y="280" width="46" height="155" rx="2" fill="url(#steel)" stroke="#999" stroke-width="0.5" opacity="0.5"/>

    <!-- Перегородка вертикальная -->
    <rect x="122" y="335" width="6" height="105" fill="url(#pvcShadow)" rx="1"/>

    <!-- Перегородка горизонтальная -->
    <rect x="35" y="330" width="178" height="6" fill="url(#pvcShadow)" rx="1"/>

    <!-- Дренажная камера внизу -->
    <rect x="45" y="438" width="20" height="4" rx="2" fill="#bbb"/>
  </g>

  <!-- ===== СТВОРКА (верхняя часть) ===== -->
  <g filter="url(#softShadow)">
    <!-- Внешний контур створки -->
    <path d="M45,60 L45,248 L255,248 L255,60 Q255,45 245,45 L55,45 Q45,45 45,60 Z"
          fill="url(#pvc)" stroke="#ccc" stroke-width="1"/>

    <!-- Камера 1 створки (левая) -->
    <rect x="53" y="145" width="65" height="92" rx="3" fill="#fff" stroke="#ddd" stroke-width="0.8" opacity="0.6"/>

    <!-- Камера 2 створки (центральная) -->
    <rect x="125" y="145" width="55" height="92" rx="3" fill="#fff" stroke="#ddd" stroke-width="0.8" opacity="0.6"/>

    <!-- Камера 3 створки (верхняя) -->
    <rect x="53" y="58" width="127" height="78" rx="3" fill="#fff" stroke="#ddd" stroke-width="0.8" opacity="0.6"/>

    <!-- Армирование створки -->
    <rect x="190" y="65" width="55" height="172" rx="2" fill="url(#steel)" stroke="#999" stroke-width="0.5" opacity="0.5"/>

    <!-- Перегородка створки горизонт -->
    <rect x="50" y="139" width="135" height="5" fill="url(#pvcShadow)" rx="1"/>
  </g>

  <!-- ===== СТЕКЛОПАКЕТ (однокамерный — 2 стекла) ===== -->
  <g>
    <!-- Стекло наружное -->
    <rect x="100" y="15" width="5" height="230" rx="1" fill="url(#glass)" stroke="#8bbdd4" stroke-width="0.5"/>
    <!-- Дистанционная рамка -->
    <rect x="107" y="20" width="10" height="220" rx="1" fill="url(#spacer)" opacity="0.7"/>
    <!-- Стекло внутреннее -->
    <rect x="119" y="15" width="5" height="230" rx="1" fill="url(#glass)" stroke="#8bbdd4" stroke-width="0.5"/>
  </g>

  <!-- ===== УПЛОТНИТЕЛИ (2 контура) ===== -->
  <!-- Уплотнитель наружный (между рамой и створкой слева) -->
  <ellipse cx="48" cy="249" rx="4" ry="5" fill="#333"/>
  <!-- Уплотнитель внутренний (между стеклопакетом и створкой) -->
  <ellipse cx="92" cy="249" rx="4" ry="5" fill="#333"/>

  <!-- Уплотнитель штапик верх -->
  <ellipse cx="92" cy="48" rx="4" ry="5" fill="#333"/>

  <!-- ===== ПОДПИСЬ ===== -->
  <!-- Размерная линия ширины -->
  <line x1="30" y1="458" x2="270" y2="458" stroke="#1a56a8" stroke-width="1.2"/>
  <line x1="30" y1="453" x2="30" y2="463" stroke="#1a56a8" stroke-width="1.2"/>
  <line x1="270" y1="453" x2="270" y2="463" stroke="#1a56a8" stroke-width="1.2"/>
  <text x="150" y="475" text-anchor="middle" font-size="14" font-weight="600" fill="#1a56a8" font-family="system-ui, sans-serif">60 мм</text>

</svg>

<h2>REHAU Blitz 60</h2>
<p>3 камеры · 2 контура уплотнения · однокамерный стеклопакет</p>
</div>
</body>
</html>
